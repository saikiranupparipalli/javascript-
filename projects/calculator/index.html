<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">
    <input type="text" class="display" placeholder="0" disabled >

    <div class="buttons">
      <button class="operator">AC</button>
      <button class="operator">DEL</button>
      <button class="operator">%</button>
      <button class="operator">÷</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">×</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operator">−</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operator">+</button>

      <button class="zero">0</button>
      <button>.</button>
      <button class="equal">=</button>
    </div>
  </div>
<script >
    let display = document.querySelector('.display')
    display.removeAttribute('disabled')
    const buttons = document.querySelector('.buttons').addEventListener('click',function(event){
        const buttonpress = event.target.innerText
        display.innerHTML += `${buttonpress}`
        // console.log(buttonpress)
    })

</script>
</body>
</html>
