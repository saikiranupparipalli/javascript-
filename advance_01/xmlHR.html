/*  				XHR(XMLHTTPREQUEST)
> XML -> xtensible markup lang.
 1.Extensible → You can create your own tags
 2.Markup → Uses tags like <tag>
 3.Language → Rules to structure data.
 > XML is used to store and transport data, not to design websites.
---
e.g: <user>
      <name>Sai Kiran</name>
      <age>22</age>
     </user>
--------------------------------------------------------------

> constructor function is used to create a new object.
  e.g:
 	const user1 = new User("Sai", 22);
 	const user2 = new User("Kiran", 25);

 	console.log(user1.name); // Sai
 	console.log(user2.age);
--------------------------------------------------------------

** XMLHttpRequest(XHR): is an old JavaScript way to talk to servers (APIs) and get data without reloading the page.

> XMLHttpRequest is a browser-provided Web API constructor used to create objects that make HTTP requests.
 
READYSTATE: readyState is a property of the XMLHttpRequest object that tells which stage the HTTP request is currently in.
> In general terms readyState property tells the current http stage.
> readystate property holds number

onreadystatechange: it is a callback function  

ONREADYSTATECHANGE: onreadystatechange is an event handler property that runs a callback function 
whenever the readyState of an XMLHttpRequest changes.

DIFFERENCE BETWEEEN READYSTATE AND ONREADYSTATECHANGE:
readyState stores the current stage of the request,
and onreadystatechange is the mechanism that notifies JavaScript when that stage changes so your code can react.

> readystate includes stages:
Value	 Name	                 Meaning (simple)
0	       UNSENT                   REQUEST created, nothing started                
1        OPENED                   OPEN() request has configured, but not sent.
2        HEADERS_RECEIVED         Server received request
3        LOADING                  Data is coming
4        DONE                     responce fully received


> Usually, Data sent from the frontend to the backend is usually converted into a JSON string,
the backend then parses it and stores it in the database in the database’s own format.

>Data comes from the backend as a JSON string, and we must convert (parse) it into a JavaScript object to use it.

*/
let image;
let follow;
const url = 'https://api.github.com/users/hiteshchoudhary'
const xml = new XMLHttpRequest()
xml.open('GET',url)
console.log(xml.readyState)
xml.onreadystatechange = function(){
    // console.log(xml.readyState)
    if(xml.readyState === 4){
      const data = JSON.parse(this.responseText)
      // console.log(typeof data)
      // console.log(data)
      // console.log(data.avatar_url)
      image = data.avatar_url
      follow = data.followers
  
    }

}
xml.send()

const button = document.querySelector('#btn').addEventListener('click',function(){
  const div = document.createElement('div')
  const img = document.createElement('img')
  const h1 = document.createElement('h1')
  img.src = image
  img.width = 100
  div.appendChild(img)
  div.appendChild(h1)
  h1.innerText = `followers: ${follow}`
  div.style.color = 'orange' 
  h1.style.fontSize = '20px'
  img.style.borderRadius = '120px'
  document.body.appendChild(div) 
})
/*
> JavaScript runs on the V8 engine, which is written in C++
 and converts JavaScript into machine code for execution.
 
 JavaScript code
      ↓
V8 Engine (built using C++)
      ↓
Machine code (0s and 1s)
      ↓
CPU executes

*/
