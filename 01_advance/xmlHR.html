** XMLHttpRequest(XHR): is an old JavaScript way to talk to servers (APIs) and get data without reloading the page.

> XMLHttpRequest is a browser-provided Web API constructor used to create objects that make HTTP requests.
 
READYSAATE: readyState is a property of the XMLHttpRequest object that tells which stage the HTTP request is currently in.
> In general terms readyState property tells the current http stage.
> readystate property holds number
readystatechange: it is a callback function  

ONREADYSTATECHANGE: onreadystatechange is an event handler property that runs a callback function 
whenever the readyState of an XMLHttpRequest changes.

DIFFERENCE BETWEEEN READYSTATE AND ONREADYSTATECHANGE:
readyState stores the current stage of the request,
and onreadystatechange is the mechanism that notifies JavaScript when that stage changes so your code can react.

> readystate includes stages:
Value	 Name	                 Meaning (simple)
0	     UNSENT                   REQUEST created, nothing started                
1        OPENED                   OPEN() request sent
2        HEADERS_RECEIVED         Server received request
3        LOADING                  Data is coming
4        DONE                     responce fully received

*/
const url = 'https://api.github.com/users/saikiran-upparipalli'
const xml = new XMLHttpRequest()
xml.open('GET',url)
console.log(xml.readyState)
xml.onreadystatechange = function(){
    // console.log(xml.readyState)
    if(xml.readyState === 4){
        console.log(this.responseText)
    }

}
xml.send()
